<!DOCTYPE html>
<html lang="en">
<head>
<title>W3.CSS Template</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600&display=swap">
<style>
body,h1,h2,h3,h4,h5,p,a,button,input,label,span,li {font-family:"Inconsolata", monospace}
body {
  font-size:16px;
  background:#fff;
  color:#111;
}
.w3-half img{margin-bottom:-6px;margin-top:16px;opacity:0.8;cursor:pointer}
.w3-half img:hover{opacity:1}
.w3-sidebar{
  background:#000 !important;
  color:#fff !important;
}
.sidebar-link{
  font-weight:600;
  font-size:24px;
  color:#fff !important;
  text-transform:uppercase;
  letter-spacing:2px;
  transition:background-color .2s,color .2s;
}
.sidebar-link:hover{
  background:#d9d9d9 !important;
  color:#000 !important;
}
.sub-link{
  font-size:17px;
  letter-spacing:1px;
  padding-left:36px !important;
}
.submenu{
  display:none;
}
.submenu.open{
  display:block;
}
.w3-red,
.w3-hover-red:hover{
  background:#000 !important;
  color:#fff !important;
}
.w3-text-red{
  color:#111 !important;
}
.w3-light-grey{
  background:#f2f2f2 !important;
  color:#111 !important;
}
.w3-dark-grey{
  background:#111 !important;
  color:#fff !important;
}
.w3-button{
  border-radius:0 !important;
}
hr[style*="solid red"]{
  border-color:#111 !important;
}
.brand-name{
  font-family:"Inconsolata", monospace;
  letter-spacing:2px;
  font-size:42px;
  line-height:1.1;
  text-transform:uppercase;
}
.portfolio-section{
  min-height:100vh;
  padding-top:80px;
}
</style>
</head>
<body>

<!-- Sidebar/menu -->
<nav class="w3-sidebar w3-collapse w3-top w3-large w3-padding" style="z-index:3;width:300px;font-weight:bold;" id="mySidebar"><br>
  <a href="javascript:void(0)" onclick="w3_close()" class="w3-button w3-hide-large w3-display-topleft" style="width:100%;font-size:22px">Aizver ciet</a>
  <div class="w3-container">
    <h3 class="w3-padding-64 brand-name"><b>Datorikas<br>portfolio</b></h3>
  </div>
  <div class="w3-bar-block">
    <a href="#showcase" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link">Attēlu apstrāde</a> 
    <a href="#services" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link">Izklājlapas</a> 
    <a href="#designers" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link">Tekstapstrāde</a> 
    <a href="#packages" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link">Ergonomisks darba režīms</a> 
    <a href="javascript:void(0)" onclick="toggleStundasMenu()" class="w3-bar-item w3-button sidebar-link">Stundas darbs</a>
    <div id="stundasSubmenu" class="submenu">
      <a href="#contact" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link sub-link">Forma</a>
      <a href="#contact" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link sub-link">Dzer daudz</a>
      <a href="#contact" onclick="w3_close()" class="w3-bar-item w3-button sidebar-link sub-link">Dzer</a>
    </div>
  </div>
</nav>

<!-- Top menu on small screens -->
<header class="w3-container w3-top w3-hide-large w3-black w3-xlarge w3-padding">
  <a href="javascript:void(0)" class="w3-button w3-black w3-margin-right" onclick="w3_open()">☰</a>
</header>

<!-- Overlay effect when opening sidebar on small screens -->
<div class="w3-overlay w3-hide-large" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>

<!-- !PAGE CONTENT! -->
<div class="w3-main" style="margin-left:340px;margin-right:40px">

  <!-- Header -->
  <div class="w3-container portfolio-section" id="showcase">
    <h1 class="w3-jumbo"><b>DATORIKAS PORTFOLIO</b></h1>
    <h1 class="w3-xxxlarge w3-text-red"><b>Attēlu apstrāde.</b></h1>
    <hr style="width:50px;border:5px solid red" class="w3-round">
  </div>

  <!-- Services -->
  <div class="w3-container portfolio-section" id="services">
    <h1 class="w3-xxxlarge w3-text-red"><b>Izklājlapas.</b></h1>
    <hr style="width:50px;border:5px solid red" class="w3-round">
  </div>
  
  <!-- Designers -->
  <div class="w3-container portfolio-section" id="designers">
    <h1 class="w3-xxxlarge w3-text-red"><b>Tekstapstrāde.</b></h1>
    <hr style="width:50px;border:5px solid red" class="w3-round">
  </div>

  <!-- Packages / Pricing Tables -->
  <div class="w3-container portfolio-section" id="packages">
    <h1 class="w3-xxxlarge w3-text-red"><b>Ergonomisks darba režīms.</b></h1>
    <hr style="width:50px;border:5px solid red" class="w3-round">
  </div>
  
  <!-- Contact -->
  <div class="w3-container portfolio-section" id="contact">
    <h1 class="w3-xxxlarge w3-text-red"><b>Stundas darbs.</b></h1>
    <hr style="width:50px;border:5px solid red" class="w3-round">
  </div>

<!-- End page content -->
</div>

<div class="w3-light-grey w3-container w3-padding-32" style="padding-right:58px">
  <p class="w3-right">Annija Elksne 10E</p>
</div>

<script>
// Script to open and close sidebar
function w3_open() {
  document.getElementById("mySidebar").style.display = "block";
  document.getElementById("myOverlay").style.display = "block";
}
 
function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
  document.getElementById("myOverlay").style.display = "none";
}

function toggleStundasMenu() {
  const submenu = document.getElementById("stundasSubmenu");
  submenu.classList.toggle("open");
}

</script>

</body>
</html>
